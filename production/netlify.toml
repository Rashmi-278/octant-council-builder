[build]
  base = "production/frontend"
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_API_URL = "https://optinpg-evaluator-production.up.railway.app"

[[redirects]]
  from = "/api/*"
  to = "https://optinpg-evaluator-production.up.railway.app/:splat"
  status = 200
  force = true
